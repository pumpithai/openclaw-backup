<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Backup</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');
        
        :root {
            --bg: #0a0a0f;
            --bg-card: #111118;
            --border: #1e1e2e;
            --text: #cdd6f4;
            --text-dim: #6c7086;
            --accent: #89b4fa;
            --green: #a6e3a1;
            --yellow: #f9e2af;
            --red: #f38ba8;
            --cyan: #94e2d5;
            --purple: #cba6f7;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }
        
        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        
        .header-title h1 {
            font-size: 18px;
            font-weight: 600;
            color: var(--green);
        }
        
        .header-subtitle {
            color: var(--text-dim);
            font-size: 12px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }
        
        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
        }
        
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .card-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.02);
        }
        
        .card-header .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .dot.red { background: var(--red); }
        .dot.yellow { background: var(--yellow); }
        .dot.green { background: var(--green); }
        
        .card-header h2 {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-left: 8px;
        }
        
        .card-body {
            padding: 16px;
        }
        
        .btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: transparent;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        
        .btn-primary {
            background: var(--green);
            border-color: var(--green);
            color: var(--bg);
        }
        
        .btn-primary:hover {
            background: #b4ebaf;
            border-color: #b4ebaf;
            color: var(--bg);
        }
        
        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        
        .stat {
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
            border: 1px solid var(--border);
        }
        
        .stat-label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: var(--accent);
            margin-top: 4px;
        }
        
        .backup-list {
            max-height: 350px;
            overflow-y: auto;
        }
        
        .backup-list::-webkit-scrollbar { width: 6px; }
        .backup-list::-webkit-scrollbar-track { background: var(--bg); }
        .backup-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        
        .backup-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }
        
        .backup-item:hover { background: rgba(255,255,255,0.03); }
        .backup-item:last-child { border-bottom: none; }
        
        .backup-icon { color: var(--yellow); margin-right: 12px; }
        
        .backup-info { flex: 1; min-width: 0; }
        
        .backup-name {
            font-size: 12px;
            color: var(--text);
            word-break: break-all;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .backup-meta { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
        
        .backup-actions { display: flex; gap: 4px; margin-left: 8px; }
        
        .btn-xs { padding: 4px 8px; font-size: 11px; }
        .btn-success { border-color: var(--green); color: var(--green); }
        .btn-success:hover { background: var(--green); color: var(--bg); }
        .btn-info { border-color: var(--cyan); color: var(--cyan); }
        .btn-info:hover { background: var(--cyan); color: var(--bg); }
        .btn-danger { border-color: var(--red); color: var(--red); }
        .btn-danger:hover { background: var(--red); color: var(--bg); }
        
        .radio-group {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .radio-label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        
        .radio-label input { accent-color: var(--accent); }
        
        .folder-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px;
            max-height: 180px;
            overflow-y: auto;
        }
        
        .folder-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .folder-item:hover { border-color: var(--accent); }
        .folder-item.selected { border-color: var(--green); background: rgba(166, 227, 161, 0.1); }
        .folder-item input { accent-color: var(--green); }
        .folder-name { flex: 1; font-size: 12px; }
        .folder-size { font-size: 10px; color: var(--text-dim); }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dim);
        }
        
        .empty-state .icon { font-size: 32px; margin-bottom: 12px; opacity: 0.5; }
        
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        
        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
            font-size: 13px;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .toast.success { border-color: var(--green); }
        .toast.success::before { content: '>'; color: var(--green); }
        .toast.error { border-color: var(--red); }
        .toast.error::before { content: '>'; color: var(--red); }
        
        .progress {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 12px;
            display: none;
        }
        
        .progress.show { display: block; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); width: 0%; transition: width 0.3s; }
        
        .pattern-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px dashed var(--border);
        }
        
        .pattern-section h3 { font-size: 11px; color: var(--yellow); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        
        .form-group { margin-bottom: 12px; }
        
        .form-label {
            display: block;
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-input {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
        }
        
        .form-input:focus { outline: none; border-color: var(--accent); }
        
        .tag-input-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            min-height: 40px;
            align-items: center;
        }
        
        .tag-input-wrapper:focus-within { border-color: var(--accent); }
        
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            background: rgba(137, 180, 250, 0.15);
            border: 1px solid var(--accent);
            border-radius: 4px;
            font-size: 12px;
            color: var(--accent);
        }
        
        .tag .tag-remove {
            cursor: pointer;
            opacity: 0.7;
            font-size: 14px;
            line-height: 1;
        }
        
        .tag .tag-remove:hover { opacity: 1; }
        
        .tag-input {
            flex: 1;
            min-width: 80px;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            outline: none;
        }
        
        .tag-input::placeholder { color: var(--text-dim); }
        
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .upload-zone:hover { border-color: var(--accent); background: rgba(137, 180, 250, 0.05); }
        .upload-zone.dragover { border-color: var(--green); background: rgba(166, 227, 161, 0.1); }
        
        .upload-zone input { display: none; }
        .upload-icon { font-size: 24px; margin-bottom: 8px; color: var(--text-dim); }
        .upload-text { font-size: 12px; color: var(--text-dim); }
        .upload-text strong { color: var(--accent); }
        
        .upload-status {
            margin-top: 12px;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            display: none;
        }
        
        .upload-status.show { display: block; }
        .upload-status.loading { background: rgba(137, 180, 250, 0.1); color: var(--accent); }
        .upload-status.success { background: rgba(166, 227, 161, 0.1); color: var(--green); }
        .upload-status.error { background: rgba(243, 139, 168, 0.1); color: var(--red); }
        
        footer {
            margin-top: 40px;
            padding: 20px 0;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--text-dim);
            font-size: 11px;
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>
    
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <div class="header-title">
                    <span style="color: var(--accent);">~</span>
                    <h1>openclaw-backup</h1>
                </div>
                <div class="header-subtitle" id="hostname">// loading...</div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-primary" onclick="createBackup()">> run backup</button>
            </div>
        </header>
        
        <div class="grid">
            <!-- Left Column -->
            <div>
                <!-- Actions Card -->
                <div class="card" style="height: 195px;">
                    <div class="card-header">
                        <div class="dot red"></div>
                        <div class="dot yellow"></div>
                        <div class="dot green"></div>
                        <h2>stats</h2>
                    </div>
                    <div class="card-body">
                        <div class="progress" id="progressBar">
                            <div class="progress-bar" id="progressFill"></div>
                        </div>
                        
                        <div class="stats">
                            <div class="stat">
                                <div class="stat-label">backups</div>
                                <div class="stat-value" id="totalBackups">-</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">total size</div>
                                <div class="stat-value" id="totalSize">-</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Options Card -->
                <div class="card" style="margin-top: 20px;">
                    <div class="card-header">
                        <div class="dot red"></div>
                        <div class="dot yellow"></div>
                        <div class="dot green"></div>
                        <h2>options.cfg</h2>
                    </div>
                    <div class="card-body">
                        <div class="form-group">
                            <label class="form-label">auto backup versions</label>
                            <input type="number" class="form-input" id="maxBackups" placeholder="10" min="1" style="width: 100%;">
                        </div>
                        <div class="form-group">
                            <label class="form-label">exclude patterns</label>
                            <div class="tag-input-wrapper">
                                <div class="tags-container" id="tagsPatterns"></div>
                                <input type="text" class="tag-input" id="inputPattern" placeholder="add pattern..." onkeydown="addPattern(event)">
                            </div>
                        </div>
                        <div style="font-size: 11px; color: var(--text-dim); margin-top: 8px;">
                            e.g.: <code style="color: var(--accent);">.log</code> <code style="color: var(--accent);">temp_*</code> <code style="color: var(--accent);">*_backup</code>
                        </div>
                        <div class="btn-row">
                            <button class="btn btn-primary" onclick="saveOptions()">save</button>
                            <button class="btn" onclick="clearOptions()">clear</button>
                        </div>
                    </div>
                </div>
                
                <!-- Schedule Card -->
                <div class="card" style="margin-top: 20px;">
                    <div class="card-header">
                        <div class="dot red"></div>
                        <div class="dot yellow"></div>
                        <div class="dot green"></div>
                        <h2>schedule.cron</h2>
                    </div>
                    <div class="card-body">
                        <div class="form-group">
                            <input type="text" class="form-input" id="cronInput" placeholder="0 0 * * *">
                        </div>
                        <select class="form-input" id="cronPreset" onchange="setCronPreset()">
                            <option value="">-- presets --</option>
                            <option value="0 * * * *">hourly</option>
                            <option value="0 0 * * *">daily</option>
                            <option value="0 0 * * 0">weekly</option>
                            <option value="0 0 1 * *">monthly</option>
                        </select>
                        <div class="btn-row">
                            <button class="btn btn-success" onclick="addSchedule()">+ add</button>
                        </div>
                        <div id="scheduleList" style="margin-top: 12px;"></div>
                    </div>
                </div>
            </div>
            
            <!-- Right Column -->
            <div>
                <!-- Upload Card -->
                <div class="card" style="height: 195px;">
                    <div class="card-header">
                        <div class="dot red"></div>
                        <div class="dot yellow"></div>
                        <div class="dot green"></div>
                        <h2>upload.tar.gz</h2>
                    </div>
                    <div class="card-body">
                        <label class="upload-zone" id="uploadZone">
                            <input type="file" id="uploadInput" accept=".tar.gz" onchange="handleUpload(this.files[0])">
                            <div class="upload-icon">[+]</div>
                            <div class="upload-text">
                                <strong>click to upload</strong><br>
                                <small>.tar.gz files only</small>
                            </div>
                        </label>
                        <div class="upload-status" id="uploadStatus"></div>
                    </div>
                </div>
                
                <!-- Backups Card -->
                <div class="card" style="margin-top: 20px;">
                    <div class="card-header">
                        <div class="dot red"></div>
                        <div class="dot yellow"></div>
                        <div class="dot green"></div>
                        <h2>backups/</h2>
                    </div>
                    <div class="card-body" style="padding: 0;">
                        <div class="backup-list" id="backupList" style="max-height: none; min-height: 590px;">
                            <div class="empty-state">
                                <div class="icon">[ ]</div>
                                <div>no backups found</div>
                            </div>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; border-top: 1px solid var(--border);">
                            <span style="color: var(--text-dim); font-size: 12px;" id="backupInfo"></span>
                            <div id="pagination" style="display: flex; gap: 4px;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <footer>
            openclaw-backup v1.0 | dev by pumpith
        </footer>
    </div>

    <script>
        const API = '/api/backup';
        let folders = [];
        let selectedFolders = new Set();
        
        function showToast(msg, type = 'success') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast ' + type;
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(function() { t.remove(); }, 3000);
        }
        
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            return (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
        }
        
        var patterns = [];
        
        function addPattern(e) {
            if (e.key === 'Enter' || e.key === ',') {
                e.preventDefault();
                var input = document.getElementById('inputPattern');
                var val = input.value.trim().replace(',', '');
                if (!val) return;
                
                if (!patterns.includes(val)) {
                    patterns.push(val);
                    renderPatterns();
                }
                input.value = '';
            }
        }
        
        function removePattern(index) {
            patterns.splice(index, 1);
            renderPatterns();
        }
        
        function renderPatterns() {
            var container = document.getElementById('tagsPatterns');
            container.innerHTML = patterns.map(function(p, i) {
                return '<span class="tag">' + p + '<span class="tag-remove" onclick="removePattern(' + i + ')">x</span></span>';
            }).join('');
        }
        
        async function saveOptions() {
            var maxBackups = document.getElementById('maxBackups').value;
            var opts = { 
                patterns: patterns,
                maxBackups: maxBackups ? parseInt(maxBackups) : 10
            };
            try {
                await fetch(API + '/options', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(opts)
                });
                showToast('options saved');
            } catch (e) {
                showToast('failed to save', 'error');
            }
        }
        
        async function loadOptions() {
            try {
                var res = await fetch(API + '/options');
                var opts = await res.json();
                if (opts.patterns) patterns = opts.patterns;
                if (opts.maxBackups) document.getElementById('maxBackups').value = opts.maxBackups;
                renderPatterns();
            } catch (e) {
                console.error('Failed to load options:', e);
            }
        }
        
        async function clearOptions() {
            patterns = [];
            document.getElementById('maxBackups').value = '10';
            renderPatterns();
            try {
                await fetch(API + '/options', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ patterns: [], maxBackups: 10 })
                });
                showToast('options cleared');
            } catch (e) {
                showToast('failed to clear', 'error');
            }
        }
        
        function getOptions() {
            if (patterns.length > 0) return { patterns: patterns };
            return {};
        }
        
        async function createBackup() {
            var opts = getOptions();
            var pb = document.getElementById('progressBar');
            var pf = document.getElementById('progressFill');
            
            pb.classList.add('show');
            pf.style.width = '30%';
            
            try {
                var res = await fetch(API + '/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(opts)
                });
                pf.style.width = '80%';
                var data = await res.json();
                pf.style.width = '100%';
                
                if (data.success) {
                    showToast('backup created: ' + data.filename);
                    refreshBackups();
                } else {
                    showToast(data.error || 'error', 'error');
                }
            } catch (e) {
                showToast(e.message, 'error');
            }
            
            setTimeout(function() {
                pb.classList.remove('show');
                pf.style.width = '0%';
            }, 1500);
        }
        
        var currentPage = 1;
        var totalPages = 1;
        var allBackupsTotalSize = 0;
        
        async function refreshBackups(page) {
            page = page || 1;
            currentPage = page;
            try {
                var res = await fetch(API + '/list?page=' + page + '&limit=10');
                var data = await res.json();
                var list = document.getElementById('backupList');
                document.getElementById('totalBackups').textContent = data.total || 0;
                
                if (page === 1 && data.total > 0) {
                    var allRes = await fetch(API + '/list?page=1&limit=' + data.total);
                    var allData = await allRes.json();
                    allBackupsTotalSize = 0;
                    if (allData.backups) {
                        allData.backups.forEach(function(b) {
                            var sizeNum = parseFloat(b.size);
                            if (!isNaN(sizeNum)) {
                                if (b.size.indexOf('KB') > -1) allBackupsTotalSize += sizeNum * 1024;
                                else if (b.size.indexOf('MB') > -1) allBackupsTotalSize += sizeNum * 1024 * 1024;
                                else if (b.size.indexOf('GB') > -1) allBackupsTotalSize += sizeNum * 1024 * 1024 * 1024;
                                else allBackupsTotalSize += sizeNum;
                            }
                        });
                    }
                }
                document.getElementById('totalSize').textContent = formatSize(allBackupsTotalSize);
                document.getElementById('backupInfo').textContent = 'page ' + data.page + ' of ' + data.totalPages + ' (' + data.total + ' total)';
                
                totalPages = data.totalPages || 1;
                
                if (!data.backups || data.backups.length === 0) {
                    list.innerHTML = '<div class="empty-state"><div class="icon">[ ]</div><div>no backups found</div></div>';
                    renderPagination();
                    return;
                }
                
                list.innerHTML = data.backups.map(function(b) {
                    return '<div class="backup-item">' +
                        '<div class="backup-icon">[*]</div>' +
                        '<div class="backup-info">' +
                            '<div class="backup-name">' + b.name + '</div>' +
                            '<div class="backup-meta">' + b.size + ' | ' + b.date + ' | ' + (b.type || 'manual') + '</div>' +
                        '</div>' +
                        '<div class="backup-actions">' +
                            '<button class="btn btn-xs btn-success" onclick="restoreBackup(\'' + b.name + '\')">restore</button>' +
                            '<button class="btn btn-xs btn-info" onclick="downloadBackup(\'' + b.name + '\')">get</button>' +
                            '<button class="btn btn-xs btn-danger" onclick="deleteBackup(\'' + b.name + '\')">del</button>' +
                        '</div>' +
                    '</div>';
                }).join('');
                
                renderPagination();
            } catch (e) {
                console.error('Error:', e);
            }
        }
        
        function renderPagination() {
            var pg = document.getElementById('pagination');
            if (totalPages <= 1) {
                pg.innerHTML = '';
                return;
            }
            
            var html = '';
            var start = Math.max(1, currentPage - 2);
            var end = Math.min(totalPages, currentPage + 2);
            
            if (currentPage > 1) {
                html += '<button class="btn btn-xs" onclick="refreshBackups(' + (currentPage - 1) + ')">&lt;</button>';
            }
            
            if (start > 1) {
                html += '<button class="btn btn-xs" onclick="refreshBackups(1)">1</button>';
                if (start > 2) html += '<span style="color: var(--text-dim);">...</span>';
            }
            
            for (var i = start; i <= end; i++) {
                if (i === currentPage) {
                    html += '<button class="btn btn-xs" style="background: var(--accent); color: var(--bg);">' + i + '</button>';
                } else {
                    html += '<button class="btn btn-xs" onclick="refreshBackups(' + i + ')">' + i + '</button>';
                }
            }
            
            if (end < totalPages) {
                if (end < totalPages - 1) html += '<span style="color: var(--text-dim);">...</span>';
                html += '<button class="btn btn-xs" onclick="refreshBackups(' + totalPages + ')">' + totalPages + '</button>';
            }
            
            if (currentPage < totalPages) {
                html += '<button class="btn btn-xs" onclick="refreshBackups(' + (currentPage + 1) + ')">&gt;</button>';
            }
            
            pg.innerHTML = html;
        }
        
        async function restoreBackup(name) {
            if (!confirm('restore "' + name + '"?\n\nThis will overwrite current data!')) return;
            try {
                await fetch(API + '/restore', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename: name })
                });
                showToast('restore started...');
            } catch (e) {
                showToast(e.message, 'error');
            }
        }
        
        function downloadBackup(name) {
            window.open(API + '/download/' + name, '_blank');
        }
        
        async function deleteBackup(name) {
            if (!confirm('delete "' + name + '"?')) return;
            try {
                var res = await fetch(API + '/delete/' + name, { method: 'DELETE' });
                var data = await res.json();
                if (data.success) {
                    showToast('deleted: ' + name);
                    refreshBackups();
                }
            } catch (e) {
                showToast(e.message, 'error');
            }
        }
        
        function setCronPreset() {
            var val = document.getElementById('cronPreset').value;
            if (val) document.getElementById('cronInput').value = val;
        }
        
        async function addSchedule() {
            var cron = document.getElementById('cronInput').value.trim();
            if (!cron) return;
            try {
                await fetch(API + '/schedules', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cron: cron, enabled: true })
                });
                showToast('schedule added');
                refreshSchedules();
            } catch (e) {
                showToast(e.message, 'error');
            }
        }
        
        async function refreshSchedules() {
            try {
                var res = await fetch(API + '/schedules');
                var data = await res.json();
                var el = document.getElementById('scheduleList');
                
                if (!data.schedules || data.schedules.length === 0) {
                    el.innerHTML = '';
                    return;
                }
                
                el.innerHTML = data.schedules.map(function(s) {
                    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:4px;margin-bottom:6px;">' +
                        '<span style="color:var(--cyan);font-size:12px;">' + s.cron + '</span>' +
                        '<button onclick="delSchedule(\'' + s.id + '\')" style="background:none;border:none;color:var(--red);cursor:pointer;font-family:inherit;">[x]</button>' +
                    '</div>';
                }).join('');
            } catch (e) {
                console.error(e);
            }
        }
        
        async function delSchedule(id) {
            try {
                await fetch(API + '/schedules/' + id, { method: 'DELETE' });
                refreshSchedules();
            } catch (e) {}
        }
        
        // Upload functions
        function handleUpload(file) {
            if (!file) return;
            
            var status = document.getElementById('uploadStatus');
            status.className = 'upload-status show loading';
            status.textContent = 'uploading... ' + file.name;
            
            var xhr = new XMLHttpRequest();
            xhr.open('POST', API + '/upload', true);
            
            xhr.upload.onprogress = function(e) {
                if (e.lengthComputable) {
                    var percent = Math.round((e.loaded / e.total) * 100);
                    status.textContent = 'uploading... ' + percent + '%';
                }
            };
            
            xhr.onload = function() {
                if (xhr.status === 200) {
                    var data = JSON.parse(xhr.responseText);
                    if (data.success) {
                        status.className = 'upload-status show success';
                        status.textContent = 'upload complete: ' + data.filename;
                        showToast('uploaded: ' + data.filename);
                        refreshBackups();
                        document.getElementById('uploadInput').value = '';
                    } else {
                        status.className = 'upload-status show error';
                        status.textContent = data.error || 'upload failed';
                    }
                } else {
                    status.className = 'upload-status show error';
                    status.textContent = 'upload failed';
                }
            };
            
            xhr.onerror = function() {
                status.className = 'upload-status show error';
                status.textContent = 'network error';
            };
            
            xhr.send(file);
        }
        
        // Drag and drop
        var uploadZone = document.getElementById('uploadZone');
        uploadZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });
        uploadZone.addEventListener('dragleave', function(e) {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
        });
        uploadZone.addEventListener('drop', function(e) {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            var file = e.dataTransfer.files[0];
            if (file && file.name.endsWith('.tar.gz')) {
                handleUpload(file);
            } else {
                showToast('only .tar.gz files allowed', 'error');
            }
        });
        
        // Init
        fetch(API + '/hostname').then(r => r.json()).then(d => {
            document.getElementById('hostname').textContent = '// ' + d.hostname;
        });
        loadOptions();
        refreshBackups();
        refreshSchedules();
        
        setInterval(function() {
            refreshBackups(currentPage);
        }, 30000);
    </script>
</body>
</html>
